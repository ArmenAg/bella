name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: typecheck / lint / format / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Build resolves env shapes for createSupabaseServerClient. Empty
          # placeholders are fine for static analysis; nothing is fetched.
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder

  db-verify:
    name: SQL + RLS verifier (local Postgres 15)
    runs-on: ubuntu-latest
    # Does not run on every PR by default — opt in by adding the `db-verify`
    # label to a PR, and always runs on pushes to main. Keeps PR runtime short
    # while still catching SQL regressions before merge.
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'db-verify')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install PostgreSQL 15
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-15 postgresql-client-15

      - name: Install dependencies
        run: npm ci

      - name: DB verifier
        env:
          PG_BIN: /usr/lib/postgresql/15/bin
        run: npm run db:verify:local-postgres
